<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting…</title>
    <style>
        body { margin:0; display:flex; align-items:center; justify-content:center;
               min-height:100vh; font-family:sans-serif; background:#f0fdf4; color:#166534; }
        p { font-size:1.1rem; }
    </style>
</head>
<body>
    <p>🔄 Signing you in…</p>
    <script>
        (function () {
            const p = new URLSearchParams(location.search);
            const raw = p.get('u');
            if (raw) {
                try {
                    const d = JSON.parse(atob(raw));
                    localStorage.setItem('userName',  d.name  || 'User');
                    localStorage.setItem('userRole',  d.role  || 'worker');
                    localStorage.setItem('userId',    d.id    || '');
                    localStorage.setItem('userPhone', d.phone || '');
                } catch (e) { /* ignore parse errors */ }
            }
            const dest = p.get('to') || 'dashboard.html';
            window.location.replace(dest);
        })();
    </script>
</body>
</html>
