<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile — Kazi Mtaani</title>
    <meta name="description" content="View worker profile on Kazi Mtaani">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── Page shell ── */
        .wp-nav {
            background: rgba(255,255,255,0.97);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow-sm);
        }
        .wp-nav-inner {
            display: flex; align-items: center; justify-content: space-between;
            height: 60px; max-width: 860px; margin: 0 auto; padding: 0 24px;
        }
        .wp-back {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 0.88rem; font-weight: 600;
            padding: 7px 14px; border-radius: var(--radius-sm);
            border: 1.5px solid var(--border); background: var(--white);
            transition: var(--transition);
        }
        .wp-back:hover { border-color: var(--green); color: var(--green); }

        .wp-wrap {
            max-width: 860px; margin: 32px auto 64px; padding: 0 24px;
        }

        /* ── Hero card ── */
        .wp-hero {
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: 36px;
            display: flex; gap: 28px; align-items: flex-start;
            box-shadow: var(--shadow-sm); margin-bottom: 20px;
            position: relative;
        }
        .wp-avatar {
            width: 96px; height: 96px; border-radius: 50%;
            background: linear-gradient(135deg, #00c853, #1de9b6);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Outfit', sans-serif; font-weight: 800;
            font-size: 2.4rem; color: white; flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(0,200,83,0.25);
        }
        .wp-hero-info { flex: 1; min-width: 0; }
        .wp-name {
            font-family: 'Outfit', sans-serif; font-size: 1.9rem;
            font-weight: 800; color: var(--text-primary); margin-bottom: 8px;
        }
        .wp-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .wp-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 20px; font-size: 0.78rem;
            font-weight: 700; border: 1px solid;
        }
        .wp-badge-green {
            background: var(--green-light); color: var(--green-dark);
            border-color: var(--green-mid);
        }
        .wp-badge-blue {
            background: #e8f0fe; color: #1a73e8; border-color: #c5d8fd;
        }
        .wp-badge-gray {
            background: #f1f5f9; color: #64748b; border-color: #e2e8f0;
        }
        .wp-meta-row {
            display: flex; flex-wrap: wrap; gap: 16px;
            font-size: 0.85rem; color: var(--text-secondary);
        }
        .wp-meta-item { display: flex; align-items: center; gap: 6px; }

        /* Rating stars */
        .wp-stars { display: flex; align-items: center; gap: 4px; }
        .wp-star { color: #f9a825; }
        .wp-star-empty { color: #e0e7ec; }
        .wp-rating-val {
            font-weight: 700; color: var(--text-primary); font-size: 0.9rem;
        }

        /* Hire button */
        .wp-hire-btn {
            position: absolute; top: 28px; right: 28px;
        }

        /* ── Content cards ── */
        .wp-card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 28px;
            margin-bottom: 16px; box-shadow: var(--shadow-sm);
        }
        .wp-card-title {
            font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-secondary); margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .wp-card-title::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .wp-bio {
            font-size: 0.95rem; color: var(--text-secondary);
            line-height: 1.75; white-space: pre-wrap;
        }
        .wp-bio-empty { font-style: italic; color: var(--text-light); font-size: 0.9rem; }

        /* Skills */
        .wp-skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .wp-skill {
            padding: 6px 16px; border-radius: 20px;
            background: var(--green-light); border: 1.5px solid var(--green-mid);
            color: var(--green-dark); font-size: 0.82rem; font-weight: 700;
        }

        /* Stats grid */
        .wp-stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
            gap: 16px;
        }
        .wp-stat {
            background: var(--off-white); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 20px 16px; text-align: center;
        }
        .wp-stat-val {
            font-size: 1.7rem; font-weight: 800; color: var(--text-primary);
            font-family: 'Outfit', sans-serif; display: block; line-height: 1;
        }
        .wp-stat-lbl {
            font-size: 0.77rem; color: var(--text-secondary);
            margin-top: 6px; display: block;
        }

        /* State boxes */
        .wp-state {
            text-align: center; padding: 80px 32px;
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius-xl); box-shadow: var(--shadow-sm);
        }
        .wp-state h2 { font-size: 1.3rem; margin-bottom: 10px; }
        .wp-state p { color: var(--text-secondary); margin-bottom: 24px; }

        /* Spinner */
        .wp-spinner {
            width: 44px; height: 44px; border: 3px solid var(--border);
            border-top-color: var(--green); border-radius: 50%;
            animation: wpSpin 0.8s linear infinite; margin: 0 auto 20px;
        }
        @keyframes wpSpin { to { transform: rotate(360deg); } }

        /* Member since */
        .wp-joined {
            font-size: 0.82rem; color: var(--text-light);
            text-align: center; margin-top: 8px;
        }

        @media (max-width: 600px) {
            .wp-hero { flex-direction: column; align-items: center; text-align: center; padding: 28px 20px; }
            .wp-meta-row { justify-content: center; }
            .wp-hire-btn { position: static; margin-top: 16px; }
            .wp-badges { justify-content: center; }
            .wp-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="wp-nav">
        <div class="wp-nav-inner">
            <a href="javascript:history.back()" class="wp-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Back
            </a>
            <a href="index.html" class="logo">Kazi<span>Mtaani</span></a>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="wp-wrap" id="wpContent">
        <div class="wp-state">
            <div class="wp-spinner"></div>
            <p style="color:var(--text-secondary);">Loading profile…</p>
        </div>
    </div>

    <script>
        function escapeHtml(s) {
            if (!s) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderStars(rating) {
            const r = Math.round((rating || 0) * 2) / 2; // round to nearest 0.5
            let html = '<div class="wp-stars">';
            for (let i = 1; i <= 5; i++) {
                if (i <= r) {
                    html += `<svg class="wp-star" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
                } else {
                    html += `<svg class="wp-star-empty" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
                }
            }
            html += `<span class="wp-rating-val">${r > 0 ? r.toFixed(1) : 'No ratings yet'}</span></div>`;
            return html;
        }

        function renderProfile(w) {
            const initial   = (w.name || '?').charAt(0).toUpperCase();
            const location  = w.location ? [w.location.subCounty, w.location.county].filter(Boolean).join(', ') : null;
            const joinDate  = w.dateJoined ? new Date(w.dateJoined).toLocaleDateString('en-KE', { year:'numeric', month:'long' }) : null;

            // Badges
            const verifiedBadge = w.isVerified
                ? `<span class="wp-badge wp-badge-green"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Verified</span>`
                : '';
            const roleBadge = `<span class="wp-badge wp-badge-gray">Worker</span>`;
            const expBadge  = w.experienceYears > 0
                ? `<span class="wp-badge wp-badge-blue">${w.experienceYears} yr${w.experienceYears !== 1 ? 's' : ''} experience</span>`
                : '';
            const specBadge = w.specialization
                ? `<span class="wp-badge wp-badge-gray">${escapeHtml(w.specialization)}</span>`
                : '';

            // Skills
            const skillsHtml = (w.skills && w.skills.length)
                ? `<div class="wp-skills-wrap">${w.skills.map(s => `<span class="wp-skill">${escapeHtml(s)}</span>`).join('')}</div>`
                : `<p class="wp-bio-empty">No skills listed yet.</p>`;

            // Stats
            const statsHtml = `
                <div class="wp-stats">
                    <div class="wp-stat">
                        <span class="wp-stat-val">${w.experienceYears || 0}</span>
                        <span class="wp-stat-lbl">Years Experience</span>
                    </div>
                    <div class="wp-stat">
                        <span class="wp-stat-val">${w.rating > 0 ? Number(w.rating).toFixed(1) : '—'}</span>
                        <span class="wp-stat-lbl">Avg Rating</span>
                    </div>
                    <div class="wp-stat">
                        <span class="wp-stat-val">${(w.skills && w.skills.length) || 0}</span>
                        <span class="wp-stat-lbl">Listed Skills</span>
                    </div>
                    <div class="wp-stat">
                        <span class="wp-stat-val">${w.isVerified ? '✓' : '—'}</span>
                        <span class="wp-stat-lbl">ID Verified</span>
                    </div>
                </div>`;

            document.title = `${escapeHtml(w.name)} — Kazi Mtaani`;

            return `
                <div class="wp-hero">
                    <div class="wp-avatar">${escapeHtml(initial)}</div>
                    <div class="wp-hero-info">
                        <div class="wp-name">${escapeHtml(w.name)}</div>
                        <div class="wp-badges">${roleBadge}${verifiedBadge}${expBadge}${specBadge}</div>
                        <div class="wp-meta-row">
                            <div class="wp-meta-item">
                                ${renderStars(w.rating)}
                            </div>
                            ${location ? `
                            <div class="wp-meta-item">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                ${escapeHtml(location)}
                            </div>` : ''}
                            ${joinDate ? `
                            <div class="wp-meta-item">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                                Member since ${escapeHtml(joinDate)}
                            </div>` : ''}
                        </div>
                    </div>
                    <div class="wp-hire-btn">
                        <a href="register.html?role=employer" class="btn-primary" style="padding:10px 22px;font-size:0.88rem;text-decoration:none;">Hire ${escapeHtml(w.name.split(' ')[0])}</a>
                    </div>
                </div>

                <div class="wp-card">
                    <div class="wp-card-title">About</div>
                    ${w.bio
                        ? `<p class="wp-bio">${escapeHtml(w.bio)}</p>`
                        : `<p class="wp-bio-empty">This worker hasn't added a bio yet.</p>`}
                </div>

                <div class="wp-card">
                    <div class="wp-card-title">Skills &amp; Expertise</div>
                    ${skillsHtml}
                </div>

                <div class="wp-card">
                    <div class="wp-card-title">Profile Summary</div>
                    ${statsHtml}
                </div>

                <p class="wp-joined">Profile on Kazi Mtaani${joinDate ? ' since ' + escapeHtml(joinDate) : ''}</p>
            `;
        }

        async function loadWorker() {
            const params = new URLSearchParams(window.location.search);
            const name   = params.get('name');
            const box    = document.getElementById('wpContent');

            if (!name || !name.trim()) {
                box.innerHTML = `
                    <div class="wp-state">
                        <h2>No worker specified</h2>
                        <p>Use a link like <code>worker.html?name=John+Doe</code> to view a profile.</p>
                        <a href="index.html" class="btn-primary" style="text-decoration:none;padding:12px 28px;">Go Home</a>
                    </div>`;
                return;
            }

            try {
                const res = await fetch('/api/auth/worker/' + encodeURIComponent(name.trim()));
                if (res.status === 404) {
                    box.innerHTML = `
                        <div class="wp-state">
                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#e0e7ec" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:20px;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="17" x2="23" y1="11" y2="17"/><line x1="23" x2="17" y1="11" y2="17"/></svg>
                            <h2>Worker Not Found</h2>
                            <p>The profile for <strong>${escapeHtml(name)}</strong> could not be found.</p>
                            <a href="index.html" class="btn-primary" style="text-decoration:none;padding:12px 28px;">Go Home</a>
                        </div>`;
                    return;
                }
                if (!res.ok) throw new Error('Server error');
                const worker = await res.json();
                box.innerHTML = renderProfile(worker);
            } catch {
                box.innerHTML = `
                    <div class="wp-state">
                        <h2>Something went wrong</h2>
                        <p>Could not load the worker profile. Please try again.</p>
                        <button onclick="loadWorker()" class="btn-primary" style="padding:12px 28px;">Retry</button>
                    </div>`;
            }
        }

        loadWorker();
    </script>

</body>
</html>
